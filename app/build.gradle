plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

def osArch = System.getProperty('os.arch', '').toLowerCase()
def isArm64 = osArch.contains('aarch64') || osArch.contains('arm64')
def javafxVersion = libs.versions.javafx.get()

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.guava
    
    // H2 Database for embedded database
    implementation libs.h2

    if (!isArm64) {
        // ARM64以外はMavenからJavaFXを取得（win classifier）
        implementation "org.openjfx:javafx-base:${javafxVersion}:win"
        implementation "org.openjfx:javafx-graphics:${javafxVersion}:win"
        implementation "org.openjfx:javafx-controls:${javafxVersion}:win"
        implementation "org.openjfx:javafx-fxml:${javafxVersion}:win"
    }
    
    // Lombok for reducing boilerplate code
    compileOnly libs.lombok
    annotationProcessor libs.lombok
    
    // Spring JDBC for database operations
    implementation libs.spring.jdbc
    
    // Log4j2 for logging
    implementation libs.log4j.api
    implementation libs.log4j.core
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'

    if (isArm64) {
        // ARM64はJavaFXをJDK同梱jmodsから解決する
        // （MavenのJavaFXネイティブ依存を使わない）
        def javaHome = System.getenv('JAVA_HOME') ?: System.getProperty('java.home')
        def jmodsDir = new File(javaHome, 'jmods')
        options.compilerArgs += [
            '--module-path', jmodsDir.absolutePath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

application {
    // Define the main class for the application.
    mainClass = 'jp.euks.PasswordManager.Launcher'
    
    // JavaFX実行のためのJVMオプション
    applicationDefaultJvmArgs = isArm64
        ? [
            '--add-modules', 'javafx.controls,javafx.fxml',
            '--add-opens', 'javafx.controls/javafx.scene.control.skin=ALL-UNNAMED',
            '--add-opens', 'javafx.graphics/javafx.scene=ALL-UNNAMED'
        ]
        : [
            '--add-opens', 'javafx.controls/javafx.scene.control.skin=ALL-UNNAMED',
            '--add-opens', 'javafx.graphics/javafx.scene=ALL-UNNAMED'
        ]
}

// JREとライブラリを含めた配布用パッケージを作成
task createMinimalJRE {
    description = 'Create minimal JRE with jlink for smaller footprint'
    group = 'distribution'
    doLast {
        def buildDirPath = project.buildDir.absolutePath
        def jreOutputDir = new File("$buildDirPath/jre-minimal")
        
        // 既存のJREディレクトリを削除
        if (jreOutputDir.exists()) {
            logger.lifecycle("Removing existing JRE directory...")
            jreOutputDir.deleteDir()
        }
        
        jreOutputDir.parentFile.mkdirs()
        
        // 必要なモジュール最小限セット
        // ARM64のみJavaFXモジュールを最小JREへ同梱
        def baseModules = 'java.base,java.desktop,java.logging,java.sql,java.naming,java.xml,java.scripting,jdk.unsupported,java.management'
        def modules = isArm64
            ? "${baseModules},javafx.base,javafx.graphics,javafx.controls,javafx.fxml"
            : baseModules
        
        logger.lifecycle("Creating minimal JRE with jlink...")
        logger.lifecycle("Modules: ${modules}")
        
        def javaHome = System.getenv('JAVA_HOME') ?: System.getProperty('java.home')
        if (!javaHome) {
            throw new GradleException('JAVA_HOME environment variable not set')
        }
        
        def jmodsPath = new File(javaHome, 'jmods')
        if (!jmodsPath.exists()) {
            throw new GradleException("jmods directory not found at: ${jmodsPath.absolutePath}")
        }

        if (isArm64) {
            // ARM64時はJDK側にJavaFX jmodがあることを必須チェック
            ['javafx.base.jmod', 'javafx.graphics.jmod', 'javafx.controls.jmod', 'javafx.fxml.jmod'].each { jmodName ->
                if (!new File(jmodsPath, jmodName).exists()) {
                    throw new GradleException("JavaFX jmod not found: ${new File(jmodsPath, jmodName).absolutePath}. Use a JavaFX-bundled JDK such as C:/bin/jdk-21")
                }
            }
        }
        
        logger.lifecycle("Using jmods from: ${jmodsPath.absolutePath}")
        logger.lifecycle("Output directory: ${jreOutputDir.absolutePath}")
        
        try {
            project.exec {
                executable 'cmd.exe'
                args '/c', "\"${new File(javaHome, 'bin/jlink.exe').absolutePath}\" --module-path \"${jmodsPath.absolutePath}\" --add-modules ${modules} --output \"${jreOutputDir.absolutePath}\" --compress 2 --strip-debug --no-header-files --no-man-pages"
            }
        } catch (Exception e) {
            logger.error("jlink command failed.")
            logger.error("JAVA_HOME: ${javaHome}")
            logger.error("jmods path: ${jmodsPath.absolutePath}")
            throw e
        }
        
        logger.lifecycle("✓ Minimal JRE created successfully")
    }
}

// jpackage用の入力ディレクトリを準備
task prepareJPackageInput {
    description = 'Prepare input directory for jpackage'
    group = 'distribution'
    dependsOn 'jar'
    doLast {
        def buildDirPath = project.buildDir.absolutePath
        def packageInputDir = new File("$buildDirPath/package-input")

        if (packageInputDir.exists()) {
            packageInputDir.deleteDir()
        }
        packageInputDir.mkdirs()

        logger.lifecycle("Copying application JAR for jpackage...")
        copy {
            from jar.archiveFile
            into packageInputDir.absolutePath
        }

        logger.lifecycle("Copying runtime dependencies for jpackage...")
        copy {
            from configurations.runtimeClasspath
            into packageInputDir.absolutePath
        }

        logger.lifecycle("✓ jpackage input prepared: ${packageInputDir.absolutePath}")
    }
}

// jpackageでWindows向けapp-image（EXE直接起動）を作成
task createWindowsAppImage {
    description = 'Create Windows app-image with EXE launcher (no installer)'
    group = 'distribution'
    dependsOn 'build', 'createMinimalJRE', 'prepareJPackageInput'
    doLast {
        def buildDirPath = project.buildDir.absolutePath
        def packageInputDir = new File("$buildDirPath/package-input")
        def jreOutputDir = new File("$buildDirPath/jre-minimal")
        def distributionDir = new File("$buildDirPath/distribution")
        def appImageDir = new File("$buildDirPath/distribution/PasswordManager")

        distributionDir.mkdirs()

        if (appImageDir.exists()) {
            logger.lifecycle("Removing existing app-image directory: ${appImageDir.absolutePath}")
            appImageDir.deleteDir()
        }

        def javaHome = System.getenv('JAVA_HOME') ?: System.getProperty('java.home')
        if (!javaHome) {
            throw new GradleException('JAVA_HOME environment variable not set')
        }

        def jpackageExe = new File(javaHome, 'bin/jpackage.exe')
        if (!jpackageExe.exists()) {
            throw new GradleException("jpackage.exe not found at: ${jpackageExe.absolutePath}")
        }

        def mainJarName = jar.archiveFileName.get()

        logger.lifecycle('Creating Windows app-image with jpackage...')
        logger.lifecycle("Using jpackage: ${jpackageExe.absolutePath}")
        logger.lifecycle("Input directory: ${packageInputDir.absolutePath}")
        logger.lifecycle("Runtime image: ${jreOutputDir.absolutePath}")

        project.exec {
            executable jpackageExe.absolutePath
            def packageArgs = [
                '--type', 'app-image',
                '--name', 'PasswordManager',
                '--dest', distributionDir.absolutePath,
                '--input', packageInputDir.absolutePath,
                '--main-jar', mainJarName,
                '--main-class', 'jp.euks.PasswordManager.Launcher',
                '--runtime-image', jreOutputDir.absolutePath,
                '--java-options', '--add-opens=javafx.controls/javafx.scene.control.skin=ALL-UNNAMED',
                '--java-options', '--add-opens=javafx.graphics/javafx.scene=ALL-UNNAMED'
            ]

            if (isArm64) {
                packageArgs.addAll(['--java-options', '--add-modules=javafx.controls,javafx.fxml'])
            }

            args packageArgs
        }

        def launcherExe = new File(appImageDir, 'PasswordManager.exe')

        if (!launcherExe.exists()) {
            throw new GradleException("Launcher EXE not found: ${launcherExe.absolutePath}")
        }

        logger.lifecycle("""
========================================
✓ Windows app-image作成完了
========================================
出力先: ${appImageDir.absolutePath}
起動方法: PasswordManager.exe を実行
========================================
""")
    }
}

task printDistributionInfo {
    description = 'Show distribution package information'
    group = 'distribution'
    doLast {
        println """
配布用パッケージ作成タスク:
    gradle createWindowsAppImage : Windows app-image作成（EXE直接起動）

実行例:
    gradle createWindowsAppImage

出力先:
    build/distribution/PasswordManager/PasswordManager.exe

特徴:
    - jpackage(app-image)でEXEランチャーを生成
    - インストーラ不要で直接起動可能
  - jlink で生成された最小限のJRE
  - 不要なモジュール/ドキュメントを除外
  - --compress=2 で圧縮
  - フットプリント最小化
""".stripIndent()
    }
}
